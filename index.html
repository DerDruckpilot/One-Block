<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#8f63ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="One Block" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>One Block</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./assets/ui/icon-192.png" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="app" aria-label="One Block Spielbereich">
      <canvas id="game" width="960" height="540"></canvas>
      <section id="hud" aria-live="polite">
        <div class="hud-title">One Block</div>
        <div id="hud-content">Lade Spiel...</div>
      </section>
      <section id="heart-hud" class="heart-hud" aria-label="Lebenspunkte"></section>
      <button id="settings-button" class="settings-button" type="button" aria-label="Einstellungen">⚙</button>
      <nav id="top-menu" aria-label="Menüs">
        <button id="inventory-button" class="top-menu-button" type="button" aria-label="Inventar">INV</button>
        <button id="crafting-button" class="top-menu-button" type="button" aria-label="Crafting">CRA</button>
        <button id="build-button" class="top-menu-button" type="button" aria-label="Bauen">BAU</button>
      </nav>
      <section id="inventory-panel" class="menu-panel" aria-label="Inventar" hidden></section>
      <section id="crafting-panel" class="menu-panel" aria-label="Crafting" hidden></section>
      <section id="build-panel" class="menu-panel" aria-label="Bauen" hidden></section>
      <section id="cooking-panel" class="menu-panel" aria-label="Kochen" hidden></section>
      <section id="furnace-panel" class="menu-panel" aria-label="Ofen" hidden></section>
      <section id="settings-panel" class="menu-panel" aria-label="Einstellungen" hidden></section>
      <section id="hotbar" aria-label="Hotbar"></section>
      <section id="hand-indicator" class="hand-indicator" aria-label="Ausgeruestete Hand"></section>
      <section id="touch-controls" aria-label="Touch-Steuerung">
        <div id="touch-joystick" class="touch-joystick" aria-label="Bewegungsstick">
          <div id="touch-joystick-knob" class="touch-joystick-knob"></div>
        </div>
        <div class="touch-buttons" aria-label="Aktionen">
          <button id="touch-attack" class="touch-button touch-button-attack" type="button" aria-label="Angriff">ATK</button>
          <button id="touch-action" class="touch-button touch-button-action" type="button" aria-label="Action">ACT</button>
        </div>
      </section>
      <section id="help">
        <strong>Steuerung:</strong> WASD/Pfeile: bewegen &middot; E/Leertaste/ACT: Aktion &middot; F: Angriff &middot; I: Inventar &middot; C: Crafting &middot; N: Bauen &middot; B: Platzieren &middot; P: Debug
      </section>
      <section id="orientation-overlay" aria-live="polite">
        <div>Bitte Gerät ins Querformat drehen</div>
      </section>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
